services:
  # 1. Triplestore RDF (Database)
  triplestore:
    image: secoresearch/fuseki
    container_name: fuseki-db
    environment:
      - ADMIN_PASSWORD=admin
    ports:
      - "3030:3030"
    volumes:
      # Montiamo il file locale dentro il container
      - ./fuseki-config/dataset.ttl:/staging/dataset.ttl:ro
    # Avviamo esplicitamente fuseki-server con gli argomenti del dataset
    command:
      - /jena-fuseki/fuseki-server
      - --file=/staging/dataset.ttl
      - /dataset
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:3030/$/ping || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - sose-network

  # 2. DaaS (Data as a Service)
  daas:
    build:
      context: ./daas
      dockerfile: Dockerfile
    container_name: daas-service
    ports:
      - "8081:8080"
    depends_on:
      triplestore:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:8080/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - sose-network

  # 3. EaaS (Ethics as a Service)
  eaas:
    build:
      context: ./eaas
      dockerfile: Dockerfile
    container_name: eaas-service
    ports:
      - "8082:8080"
    volumes:
      # Montiamo la cartella delle policy in sola lettura
      - ./eaas/policies:/app/policies:ro
    depends_on:
      daas:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:8080/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - sose-network

  # 4. Client (Simulatore / Orchestratore)
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: client-app
    environment:
      - DAAS_URL=http://daas:8080/api
      - EAAS_URL=http://eaas:8080/api/evaluate
      - HTTP_MAX_RETRIES=3
      - HTTP_TIMEOUT_MS=3000
      - HTTP_RETRY_BACKOFF_MS=500
    depends_on:
      daas:
        condition: service_healthy
      eaas:
        condition: service_healthy
    networks:
      - sose-network

networks:
  sose-network:
    driver: bridge